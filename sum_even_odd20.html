<!DOCTYPE html>

	<title></title>
</head>
<body>
	<script>

a=1;
es=0;
os=0;
while(a<=20)
{
if(a%2==0)
{
es=es+a;
document.write("<br> even is "+ a);
}
else
{
os=os+a;
document.write("<br> odd is "+ a);
}	
a++;
}
document.write("<br> sum of even is "+ es);
document.write("<br> sum of odd is "+ os);


</script>

</body>
